# CI-optimized Docker Compose Configuration
# This skips the heavy transformers model to speed up CI runs

version: '3.8'

services:
  # ============================================
  # Weaviate - Without Vectorizer (CI Mode)
  # ============================================
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    container_name: intramind-weaviate-ci
    ports:
      - "8080:8080"
    environment:
      # Query Configuration
      QUERY_DEFAULTS_LIMIT: 25

      # Authentication
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'

      # Persistence (in-memory for CI)
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'

      # NO VECTORIZER for CI (much faster)
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''

      # Cluster Configuration
      CLUSTER_HOSTNAME: 'node1'

      # Logging
      LOG_LEVEL: 'warning'
    networks:
      - intramind-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ============================================
  # Vector Service
  # ============================================
  vector-service:
    image: intramind-vector-service:ci-latest
    container_name: intramind-vector-service-ci
    ports:
      - "50052:50052"
    environment:
      - WEAVIATE_URL=http://weaviate:8080
      - WEAVIATE_KEY=
      - ENVIRONMENT=CI
      - APPLICATION_ID=intramind-vector-service-ci
      - GRPC_PORT=50052
      - DEFAULT_VECTORIZER=none
      - VECTORIZER_ENABLED=false
    networks:
      - intramind-network
    depends_on:
      weaviate:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import grpc; channel = grpc.insecure_channel(\"localhost:50052\"); grpc.channel_ready_future(channel).result(timeout=5)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============================================
  # API Gateway
  # ============================================
  api-gateway:
    image: intramind-api-gateway:ci-latest
    container_name: intramind-api-gateway-ci
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - VectorService__Endpoint=http://vector-service:50052
    networks:
      - intramind-network
    depends_on:
      vector-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health/liveness || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ============================================
  # Prompt Registry
  # ============================================
  prompt-registry-db:
    image: postgres:16-alpine
    container_name: intramind-prompt-registry-db-ci
    environment:
      - POSTGRES_DB=intramind_prompt_registry
      - POSTGRES_USER=intramind_prompt_registry
      - POSTGRES_PASSWORD=intramind_prompt_registry
    networks:
      - intramind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intramind_prompt_registry -d intramind_prompt_registry"]
      interval: 5s
      timeout: 3s
      retries: 10

  prompt-registry:
    image: intramind-prompt-registry:ci-latest
    container_name: intramind-prompt-registry-ci
    ports:
      - "8010:8010"
    environment:
      - PROMPT_REGISTRY_DATABASE_URL=postgresql+asyncpg://intramind_prompt_registry:intramind_prompt_registry@prompt-registry-db:5432/intramind_prompt_registry
      - PROMPT_REGISTRY_ADMIN_API_KEY=admin-dev-key
      - PROMPT_REGISTRY_SERVICE_API_KEY=service-dev-key
      - PROMPT_REGISTRY_AUTH_DEV_MODE=true
      - PROMPT_REGISTRY_AUTO_CREATE_SCHEMA=true
      - PROMPT_REGISTRY_AI_AGENT_SRC_PATH=/workspace/ai-agent/src
    volumes:
      - ./ai-agent:/workspace/ai-agent:ro
    networks:
      - intramind-network
    depends_on:
      prompt-registry-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

networks:
  intramind-network:
    driver: bridge
    name: intramind-network-ci
