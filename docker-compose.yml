version: '3.8'

services:
  # ============================================
  # Database Layer - Weaviate Vector Database
  # ============================================
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    container_name: intramind-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"     # HTTP/REST API
      - "50051:50051"   # gRPC API (internal)
    environment:
      # Query Configuration
      QUERY_DEFAULTS_LIMIT: 25
      
      # Authentication - Anonymous access enabled for local development
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      
      # Persistence
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      
      # Vectorizer Configuration - Uses free local transformers
      DEFAULT_VECTORIZER_MODULE: 'text2vec-transformers'
      
      # Modules - text2vec-transformers enabled (free, local)
      ENABLE_MODULES: 'text2vec-transformers'
      
      # Transformers Configuration
      TRANSFORMERS_INFERENCE_API: 'http://t2v-transformers:8080'
      
      # Cluster Configuration
      CLUSTER_HOSTNAME: 'node1'
      
      # Logging
      LOG_LEVEL: 'info'
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - intramind-network
    depends_on:
      t2v-transformers:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  t2v-transformers:
    image: cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2
    container_name: intramind-transformers
    restart: unless-stopped
    environment:
      ENABLE_CUDA: '0'  # Set to '1' if you have NVIDIA GPU support
    networks:
      - intramind-network
    healthcheck:
      # The transformers image is Python-based and ships no wget/curl, so probe
      # the readiness endpoint with urllib instead (urlopen raises -> nonzero).
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/.well-known/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Service Layer - gRPC Vector Service
  # ============================================
  vector-service:
    build:
      context: ./vector-db-service
      dockerfile: Dockerfile
    container_name: intramind-vector-service
    restart: unless-stopped
    ports:
      - "50052:50052"   # gRPC API
    environment:
      # Weaviate Connection
      - WEAVIATE_URL=http://weaviate:8080
      - WEAVIATE_KEY=
      
      # Application Settings
      - ENVIRONMENT=Docker
      - APPLICATION_ID=intramind-vector-service
      
      # gRPC Configuration
      - GRPC_PORT=50052
    networks:
      - intramind-network
    depends_on:
      weaviate:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import grpc; channel = grpc.insecure_channel(\"localhost:50052\"); grpc.channel_ready_future(channel).result(timeout=5)' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Observability - Phoenix (self-hosted RAI tracing UI)
  # ============================================
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: intramind-phoenix
    restart: unless-stopped
    ports:
      - "6006:6006"     # Phoenix UI + OTLP HTTP collector
      - "4317:4317"     # OTLP gRPC collector
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - phoenix_data:/mnt/data
    networks:
      - intramind-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6006/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ============================================
  # Prompt Registry - Runtime Prompt Source
  # ============================================
  prompt-registry-db:
    image: postgres:16-alpine
    container_name: intramind-prompt-registry-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=intramind_prompt_registry
      - POSTGRES_USER=intramind_prompt_registry
      - POSTGRES_PASSWORD=intramind_prompt_registry
    volumes:
      - prompt_registry_data:/var/lib/postgresql/data
    networks:
      - intramind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intramind_prompt_registry -d intramind_prompt_registry"]
      interval: 10s
      timeout: 5s
      retries: 5

  prompt-registry:
    build:
      context: ./prompt-registry
      dockerfile: Dockerfile
    container_name: intramind-prompt-registry
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      - PROMPT_REGISTRY_DATABASE_URL=postgresql+asyncpg://intramind_prompt_registry:intramind_prompt_registry@prompt-registry-db:5432/intramind_prompt_registry
      - PROMPT_REGISTRY_ADMIN_API_KEY=${PROMPT_REGISTRY_ADMIN_API_KEY:-admin-dev-key}
      - PROMPT_REGISTRY_SERVICE_API_KEY=${PROMPT_REGISTRY_SERVICE_API_KEY:-service-dev-key}
      - PROMPT_REGISTRY_AUTH_DEV_MODE=${PROMPT_REGISTRY_AUTH_DEV_MODE:-true}
      - PROMPT_REGISTRY_AUTO_CREATE_SCHEMA=${PROMPT_REGISTRY_AUTO_CREATE_SCHEMA:-true}
      - PROMPT_REGISTRY_AI_AGENT_SRC_PATH=/workspace/ai-agent/src
    volumes:
      - ./ai-agent:/workspace/ai-agent:ro
    networks:
      - intramind-network
    depends_on:
      prompt-registry-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============================================
  # Gateway Layer - REST API Gateway
  # ============================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: src/IntraMind.ApiGateway/Dockerfile
    container_name: intramind-api-gateway
    restart: unless-stopped
    ports:
      - "5000:8080"     # REST API (external:internal)
    environment:
      # ASP.NET Core Configuration
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      
      # Vector Service Connection
      - VectorService__Endpoint=http://vector-service:50052
    networks:
      - intramind-network
    depends_on:
      vector-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

# ============================================
# Volumes
# ============================================
volumes:
  weaviate_data:
    driver: local
    name: intramind_weaviate_data
  phoenix_data:
    driver: local
    name: intramind_phoenix_data
  prompt_registry_data:
    driver: local
    name: intramind_prompt_registry_data

# ============================================
# Networks
# ============================================
networks:
  intramind-network:
    driver: bridge
    name: intramind-network

